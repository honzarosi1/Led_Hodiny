<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g font-family="'Courier New', monospace" font-weight="700" font-size="220" text-anchor="middle" filter="url(#glow)">
    <text x="145" y="330" fill="#ff2d55">9</text>
    <text x="256" y="310" fill="#ff2d55" font-size="180">:</text>
    <text x="340" y="330" fill="#ff2d55">4</text>
  </g>
</svg>
