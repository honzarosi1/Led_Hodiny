name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend directory
        id: detect
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
            echo "Found frontend/package.json"
            ls -la frontend | head -30
          elif [ -f "package.json" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "Found package.json in repo root"
          else
            echo "ERROR: No package.json found at root or in frontend/"
            ls -la
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (npm with legacy peer deps)
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          echo "--- directory contents ---"
          ls -la
          echo "--- installing with npm --legacy-peer-deps ---"
          npm install --legacy-peer-deps --no-audit --no-fund
          echo "--- ensuring ajv is present (CRA5 fix) ---"
          npm install --legacy-peer-deps --no-audit --no-fund ajv@^8 ajv-keywords@^5

      - name: Build
        working-directory: ${{ steps.detect.outputs.dir }}
        env:
          CI: "false"
          DISABLE_ESLINT_PLUGIN: "true"
          PUBLIC_URL: "./"
          GENERATE_SOURCEMAP: "false"
        run: npm run build

      - name: Show build output
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          echo "--- build directory ---"
          ls -la build | head -20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.dir }}/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
